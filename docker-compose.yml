version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: bi_postgres
    environment:
      POSTGRES_DB: bi_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3

  app:
    build: .
    container_name: bi_app
    ports:
      - "7860:7860"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/bi_db
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./output:/app/output

volumes:
  postgres_data:
